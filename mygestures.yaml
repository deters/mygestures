# MyGestures - Modern YAML Configuration

# Default gestures available in all windows
global:
  "Close window":
    move: "0,0 0,100 100,100"
    do: kill

  "Maximize window":
    move: "50,100 50,0"
    do: toggle-maximized

  "Minimize window":
    move: "50,0 50,100"
    do: iconify

  "Previous page":
    move: "100,50 0,50"
    do: keypress Alt_L+Left

  "Next page":
    move: "0,50 100,50"
    do: keypress Alt_L+Right

  "Workspace Left":
    move: "100,100 0,0"
    do: workspace-left

  "Workspace Right":
    move: "0,100 100,0"
    do: workspace-right

  "Show Overview":
    move: "0,100 100,0"
    do: show-overview

  "Show App Grid":
    move: "100,100 0,0"
    do: show-app-grid

  "Copy":
    move: "100,0 0,0 0,100 100,100"
    do: keypress Control_L+C

  "Paste":
    move: "0,0 50,100 100,0"
    do: keypress Control_L+V

  "New":
    move: "0,100 0,0 100,100 100,0"
    do: keypress Control_L+N

  "Open":
    move: "50,0 0,50 50,100 100,50 50,0"
    do: keypress Control_L+O

  "Print":
    move: "0,100 0,0 100,0 100,50 0,50"
    do: keypress Control_L+P

  "Save":
    move: "100,0 0,0 0,50 100,50 100,100 0,100"
    do: keypress Control_L+S

  "Escape":
    move: "50,100 50,0"
    do: keypress Escape

  "New tab":
    move: "0,0 100,0 50,0 50,100"
    do: keypress Control_L+T

  "Close tab":
    move: "0,0 100,0 100,100"
    do: keypress Control_L+W

  "Run default browser":
    move: "0,0 25,100 50,50 75,100 100,0"
    do: www

  "Run gedit":
    move: "100,0 0,0 0,100 100,100 100,50 50,50"
    do: exec gedit

  "Previous Tab":
    move: "100,100 0,0 0,100"
    do: keypress Control_L+Shift_L+Tab

  "Next Tab":
    move: "0,100 100,0 100,100"
    do: keypress Control_L+Tab
