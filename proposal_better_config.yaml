# MyGestures - Modern Configuration Proposal

# Reusable movement definitions (Regex)
movements:
  Up: U
  Down: D
  Left: L
  Right: R
  Circle: (LDRUL)+
  NorthWest: (7(U|L)?)+

# Default gestures available in all windows
global:
  "Close window":
    move: DownRight  # Uses a named movement
    do: kill         # Built-in system-agnostic action

  "Maximize":
    move: U          # Inlined stroke (no need to define "Up" first)
    do: toggle-maximized

  "Iconify":
    move: D
    do: iconify

  "Copy":
    move: C
    keys: Control_L+C # Shortcut for action: keypress

# App-specific overrides
apps:
  - name: Terminal
    match: { class: ".*(Term|term).*" }
    gestures:
      "New tab":
        move: T
        keys: Control_L+Shift_L+T
      "Paste":
        move: V
        keys: Control_L+Shift_L+V

  - name: Web Browsers
    match: { class: "Google-chrome|firefox" }
    gestures:
      "Close tab":
        move: RD
        keys: Control_L+W
      "Back":
        move: L
        keys: Alt_L+Left
