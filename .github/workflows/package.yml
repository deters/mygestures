name: Build and Release Packages

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-fedora:
    name: Build Fedora RPM
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y meson ninja-build cargo rust gtk4-devel libevdev-devel gcc rpm-build rpmdevtools git

      - name: Build RPM
        run: |
          rpmdev-setuptree
          VERSION=$(grep '^Version:' mygestures.spec | awk '{print $2}')
          tar --exclude-vcs --transform "s,^\.,mygestures-$VERSION," -czf ~/rpmbuild/SOURCES/mygestures-$VERSION.tar.gz .
          rpmbuild -ba mygestures.spec

      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-rpm
          path: |
            /github/home/rpmbuild/RPMS/*/*.rpm
            /github/home/rpmbuild/SRPMS/*.rpm

  build-debian:
    name: Build Debian DEB
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential devscripts debhelper cargo rustc libevdev-dev libgtk-4-dev libc6-dev pkg-config git

      - name: Build Debian Package
        run: |
          # Allow building as root inside the container
          dpkg-buildpackage -us -uc -b

      - name: Upload Debian Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-deb
          path: ../*.deb

  build-alpine:
    name: Build Alpine APK
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --user root
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apk update
          apk add alpine-sdk meson ninja cargo rust gtk4.0-dev libevdev-dev pkgconfig git sudo

      - name: Build Alpine Package
        run: |
          # Create builder user (abuild cannot run as root)
          adduser -D builder -G abuild
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:abuild /github/workspace
          
          # Run abuild as builder user
          su builder -c "abuild-keygen -i -a -n"
          su builder -c "abuild -r"

      - name: Upload Alpine Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-apk
          path: /home/builder/packages/*/*/*.apk

  release:
    name: Publish Github Release
    needs: [build-fedora, build-debian, build-alpine]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish Release with Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.rpm
            **/*.deb
            **/*.apk
