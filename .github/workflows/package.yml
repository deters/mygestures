name: Build and Release Packages

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-fedora:
    name: Build Fedora RPM
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            .cargo
            target-fedora
          key: ${{ runner.os }}-fedora-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fedora-cargo-

      - name: Install dependencies
        run: |
          dnf install -y meson ninja-build cargo rust gtk4-devel libevdev-devel gcc rpm-build rpmdevtools git

      - name: Build RPM
        run: |
          export CARGO_HOME=$GITHUB_WORKSPACE/.cargo
          export OVERRIDE_CARGO_TARGET_DIR=$GITHUB_WORKSPACE/target-fedora
          rpmdev-setuptree
          VERSION=$(grep '^Version:' packaging/mygestures.spec | awk '{print $2}')
          tar --exclude-vcs --exclude='.cargo' --exclude='target-fedora' --transform "s,^\.,mygestures-$VERSION," -czf ~/rpmbuild/SOURCES/mygestures-$VERSION.tar.gz .
          rpmbuild -ba packaging/mygestures.spec

      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-rpm
          path: |
            /github/home/rpmbuild/RPMS/*/*.rpm
            /github/home/rpmbuild/SRPMS/*.rpm

  build-debian:
    name: Build Debian DEB
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            .cargo
            target
          key: ${{ runner.os }}-debian-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-debian-cargo-

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential devscripts debhelper libevdev-dev libgtk-4-dev libc6-dev pkg-config git curl
          
          # Ensure 'input' group exists in the build container (required for chgrp during packaging)
          getent group input >/dev/null || groupadd -r input
          
          # Set CARGO_HOME to a workspace-relative directory so it can be cached
          export CARGO_HOME=$GITHUB_WORKSPACE/.cargo
          
          # Install rustup only if not already cached
          if [ ! -f "$CARGO_HOME/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$CARGO_HOME/bin" >> $GITHUB_PATH

      - name: Build Debian Package
        run: |
          export CARGO_HOME=$GITHUB_WORKSPACE/.cargo
          dpkg-buildpackage -us -uc -b -d
          mv ../*.deb .

      - name: Upload Debian Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-deb
          path: "*.deb"

  build-alpine:
    name: Build Alpine APK
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --user root
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            .cargo
            target-alpine
          key: ${{ runner.os }}-alpine-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-alpine-cargo-

      - name: Install dependencies
        run: |
          apk update
          apk add alpine-sdk meson ninja cargo rust gtk4.0-dev libevdev-dev pkgconfig git sudo

      - name: Build Alpine Package
        run: |
          # Create builder user (abuild cannot run as root)
          adduser -D builder -G abuild
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:abuild .
          
          # Run abuild as builder user
          su builder -c "abuild-keygen -i -a -n"
          su builder -c "export CARGO_HOME=$GITHUB_WORKSPACE/.cargo && export OVERRIDE_CARGO_TARGET_DIR=$GITHUB_WORKSPACE/target-alpine && cd packaging && abuild checksum && abuild -r"

      - name: Upload Alpine Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alpine-apk
          path: /home/builder/packages/*/*/*.apk

  release:
    name: Publish Github Release
    needs: [build-fedora, build-debian, build-alpine]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish Release with Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.rpm
            **/*.deb
            **/*.apk
