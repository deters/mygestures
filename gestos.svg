<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>

    <!-- Path Gradient -->
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7"/> <!-- Purple/Lavender -->
      <stop offset="50%" stop-color="#89b4fa"/> <!-- Blue -->
      <stop offset="100%" stop-color="#89dceb"/> <!-- Cyan -->
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow Filter for Cursor -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base Squircle Background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" stroke="#313244" stroke-width="6"/>

  <!-- The Gestural Loop/Path -->
  <path d="M 140 280 C 140 160, 240 140, 280 200 C 320 260, 380 380, 280 380 C 180 380, 200 240, 320 180 C 400 140, 400 260, 340 320" 
        fill="none" 
        stroke="url(#pathGrad)" 
        stroke-width="18" 
        stroke-linecap="round" 
        filter="url(#glow)"/>

  <!-- Tracing Pointer/Cursor -->
  <g transform="translate(340, 320) rotate(135)" filter="url(#shadow)">
    <polygon points="0,0 0,36 10,27 20,37 25,32 15,22 25,22" fill="#ffffff" stroke="#11111b" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <!-- Glowing Tip Circle -->
  <circle cx="340" cy="320" r="7" fill="#89dceb" filter="url(#glow)"/>
</svg>
