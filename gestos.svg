<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>

    <!-- Path Gradient -->
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7"/> <!-- Purple/Lavender -->
      <stop offset="50%" stop-color="#89b4fa"/> <!-- Blue -->
      <stop offset="100%" stop-color="#89dceb"/> <!-- Cyan -->
    </linearGradient>
  </defs>

  <!-- Base Squircle Background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" stroke="#313244" stroke-width="6"/>

  <!-- Vector Glow Layers for the Cursor-Shaped Draw Path (No Filters) -->
  <!-- Outer Glow -->
  <path d="M 190 100 v 260 l 70 -60 l 60 120 l 40 -20 l -60 -120 h 70 Z" 
        fill="none" 
        stroke="url(#pathGrad)" 
        stroke-width="36" 
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-opacity="0.1"/>

  <!-- Mid Glow -->
  <path d="M 190 100 v 260 l 70 -60 l 60 120 l 40 -20 l -60 -120 h 70 Z" 
        fill="none" 
        stroke="url(#pathGrad)" 
        stroke-width="26" 
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-opacity="0.25"/>

  <!-- Core Sharp Stroke -->
  <path d="M 190 100 v 260 l 70 -60 l 60 120 l 40 -20 l -60 -120 h 70 Z" 
        fill="none" 
        stroke="url(#pathGrad)" 
        stroke-width="14" 
        stroke-linejoin="round"
        stroke-linecap="round"/>
</svg>
