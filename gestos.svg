<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>

    <!-- Path Gradient -->
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7"/> <!-- Purple/Lavender -->
      <stop offset="50%" stop-color="#89b4fa"/> <!-- Blue -->
      <stop offset="100%" stop-color="#89dceb"/> <!-- Cyan -->
    </linearGradient>
  </defs>

  <!-- Base Squircle Background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" stroke="#313244" stroke-width="6"/>

  <!-- Vector Glow Layers (No Filters) -->
  <!-- Outer Glow -->
  <path d="M 140 280 C 140 160, 240 140, 280 200 C 320 260, 380 380, 280 380 C 180 380, 200 240, 320 180 C 400 140, 400 260, 340 320" 
        fill="none" 
        stroke="url(#pathGrad)" 
        stroke-width="36" 
        stroke-linecap="round"
        stroke-opacity="0.1"/>

  <!-- Mid Glow -->
  <path d="M 140 280 C 140 160, 240 140, 280 200 C 320 260, 380 380, 280 380 C 180 380, 200 240, 320 180 C 400 140, 400 260, 340 320" 
        fill="none" 
        stroke="url(#pathGrad)" 
        stroke-width="26" 
        stroke-linecap="round"
        stroke-opacity="0.25"/>

  <!-- Core Sharp Stroke -->
  <path d="M 140 280 C 140 160, 240 140, 280 200 C 320 260, 380 380, 280 380 C 180 380, 200 240, 320 180 C 400 140, 400 260, 340 320" 
        fill="none" 
        stroke="url(#pathGrad)" 
        stroke-width="14" 
        stroke-linecap="round"/>

  <!-- Glowing Tip Vector Halo (No Filters) -->
  <circle cx="340" cy="320" r="24" fill="#89dceb" opacity="0.15"/>
  <circle cx="340" cy="320" r="14" fill="#89dceb" opacity="0.3"/>
  <circle cx="340" cy="320" r="6" fill="#ffffff"/>

  <!-- Cursor Vector Shadow (No Filters) - Classic macOS Geometry -->
  <g transform="translate(343, 324) scale(3.5)">
    <polygon points="0,0 0,17 4.5,13 8.5,22.5 11.5,21.1 7.5,11.5 12,11.5" fill="#000000" opacity="0.3" stroke="#000000" stroke-width="1.2" stroke-linejoin="miter" stroke-opacity="0.3"/>
  </g>

  <!-- Cursor Body - Classic macOS Geometry -->
  <g transform="translate(340, 320) scale(3.5)">
    <polygon points="0,0 0,17 4.5,13 8.5,22.5 11.5,21.1 7.5,11.5 12,11.5" fill="#ffffff" stroke="#11111b" stroke-width="1.2" stroke-linejoin="miter"/>
  </g>
</svg>
